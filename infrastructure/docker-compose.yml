services:
  client:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.client
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    restart: unless-stopped
