apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: openhammer
  labels:
    app: openhammer
    tier: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openhammer
      tier: server
  template:
    metadata:
      labels:
        app: openhammer
        tier: server
    spec:
      containers:
        - name: server
          image: openhammer/server:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
